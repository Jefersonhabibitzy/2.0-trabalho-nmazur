<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music.Word - Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="search-bar">
            <input type="text" placeholder="o que você quer ouvir?">
            <span class="search-icon">🔍</span>
        </div>
        
        <div class="logo">
            <h1>MUSIC<span>WORD</span></h1>
        </div>

        <nav class="nav-links">
            <a href="#">artistas</a>
            <a href="#">músicas</a>
            <a href="#">playlist</a>
            <a href="#">podcast</a>
            <div class="profile-icon">👤</div>
        </nav>
    </header>

    <main class="container">
        <section class="hero-banner">
            <img src="251110-itzy-the-11th-mini-album-tunnel-vision-members-v0-p3yjlu53f90g1 1.png" alt="Tunnel Vision Banner">
        </section>

        <section class="genres-row">
            <div class="genre-card">
                <img src="14bc09026db0404c8bfff28d59da869e 1 (1).png" alt="Forró">
                <div class="genre-text">forró khamaizar</div>
            </div>
            <div class="genre-card">
                <img src="06906a7b11864f5c807ca7a3094657cf 1 (1).png" alt="Hiphop">
                <div class="genre-text">hiphop ythalo riam</div>
            </div>
            <div class="genre-card">
                <img src="16dbec0fbf9a421ab5e5b12c24b70da6 1.png" alt="Axé">
                <div class="genre-text">axé xamma</div>
            </div>
            <div class="genre-card">
                <img src="657369024f4d46c1af7342d24e225a39 1.png" alt="Pagode">
                <div class="genre-text">pagode lucas ortega</div>
            </div>
        </section>

        <section class="playlists-section">
            <h2 class="section-title">ESCOLHA UMA PLAYLIST</h2>
            <div class="playlist-grid">
                <div class="card card-funk">FUNK MTG</div>
                <div class="card card-ouvidos">ARTISTAS + OUVIDOS</div>
                <div class="card card-gospel">GERAÇÃO NOVO GOSPEL</div>
                <div class="card card-trappers">TRAPPERS</div>
                <div class="card card-tiktok">MÚSICAS PARA TIKTOK</div>
                <div class="card card-amava">AMAVA COISA NENHUMA</div>
                <div class="card card-forro">FORRÓ DE PAREDÃO</div>
                <div class="card card-brasil">BRASIL ALTERNATIVO</div>
            </div>
        </section>
    </main>

</body>
</html>
