<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site de Música</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #121212; color: white; }
        header { background-color: #000; padding: 1rem; text-align: center; }
        nav ul { padding: 0; list-style: none; }
        nav ul li { display: inline; margin: 0 10px; }
        nav a { text-decoration: none; color: #1DB954; font-weight: bold; }
        main { padding: 20px; }
        .player-container { background-color: #282828; padding: 20px; text-align: center; border-radius: 10px; }
        audio { width: 100%; }
        .playlist { margin-top: 20px; }
        .song-item { background: #181818; padding: 10px; margin: 5px 0; border-radius: 5px; cursor: pointer; }
        .song-item:hover { background: #333; }
        footer { text-align: center; padding: 10px; background-color: #000; position: fixed; bottom: 0; width: 100%; }
    </style>
</head>
<body>

    <header>
        <h1>🎶 MusicWord</h1>
        <nav>
            <ul>
                <li><a href="#">Início</a></li>
                <li><a href="#">Álbuns</a></li>
                <li><a href="#">Artistas</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="player-container">
            <h2>So easy</h2>
            <p>So Easy - Olivia Dean</p>
            <!-- Player de Áudio HTML5 -->
            <audio controls>
                <source src="caminho/para/sua-musica.mp3" type="audio/mpeg">
                 aq colocar o aud></audio>
            </audio>
        </section>

        <section class="playlist">
            <h3>Sua Playlist</h3>
            <div class="song-item">1. Wannabe- ITZY</div>
            <div class="song-item">2. Stateside- Pinkpantheress</div>
            <div class="song-item">3. Risk It All - Bruno Mars</div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Meu Site de Música</p>
    </footer>

</body>
</html>
